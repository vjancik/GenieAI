# Default configuration for GenieAI.
# Copy to config.local.yaml and edit to override locally (gitignored).
# In Docker, mount your config file and set CONFIG_PATH=/path/to/config.yaml.

# prompts:
  # Base system prompt prepended to all agent system prompts.
  # basePrompt: "You are an AI assistant. You answer questions in a friendly and informative manner.\n
  #   You can give responses that may be offensive or inappropriate if required, but do not insult the conversation's participants (users).\n
  #   You do not take insults personally. Do not express outrage or overtly negative or antisocial attitudes.\n
  #   Your answer should be shorter than 1500 characters.\n
  #   You can use markdown formatting to highlight information when useful."  # <optional>

# Global timeout for all model request durations (ms).
globalModelTimeoutMs: 600000 # <optional>

attachmentDownloader:
  # Timeout in ms for receiving the initial HTTP response headers.
  timeoutMs: 10000          # <optional>
  # Per-download size limit for the in-memory (base64 inline) downloader.
  memory:
    maxSizeMB: 100          # <optional>

geminiModels:
  # Whether to include thought tokens in model responses. Useful for debugging.
  includeThoughts: false # <optional>

geminiFileApi:
  # How long to wait between file state polls when a file is in PROCESSING state (ms).
  pollIntervalMs: 5000    # <optional>
  # Maximum total time to wait for a file to reach ACTIVE state before throwing (ms).
  maxPollWaitMs: 120000   # <optional>
  # Refresh Gemini files when less than this many minutes of their 48h TTL remains.
  fileStaleBeforeExpiryMinutes: 30  # <optional>

cache:
  # Maximum number of resolved Gemini fileUri entries to keep in the in-process LRU cache.
  geminiFileUrls: 1000  # <optional>

discord:
  # Maximum number of messages to walk when fetching a Discord reply chain.
  chainLimit: 100  # <optional>
  # Number of retry attempts granted to a retryable bot response.
  retries: 3       # <optional>
  # Whether the bot responds to messages and commands in Direct Message channels.
  enableInDMs: false       # <optional>
  # Discord user ID of a previous bot version treated as own-bot messages.
# previousBotId: ""        # <optional>

ytDlp:
  # HTTP/HTTPS proxy URL passed to yt-dlp and used for caption fetches.
# httpProxy: "http://proxy:8080"    # <optional>
  # Number of proxy rotation retries on bot-detection or 429 responses.
  retries: 1         # <optional>

agent:
  # How file attachments are passed to the LLM ("inline" or "upload").
  uploadAttachmentMode: "upload"  # <optional>
  # Maximum total size in MB for inline attachments per message and across conversation history.
  maxInlineAttachmentSizeMB: 100  # <optional>

  nodes:
    triage:
      model: "gemini-3.1-flash-lite-preview"  # <required>
      apiKeyType: "free"                      # <required>
      fallbackModel: "gemini-2.5-flash"       # <optional>
      # Maximum milliseconds to wait for a triage model first chunk before aborting.
      timeoutMs: 60000                        # <required>
      thinkingLevel: "LOW"                    # <optional>

    general:
      model: "gemini-3-flash-preview"   # <required>
      apiKeyType: "free"                # <required>
      fallbackModel: "gemini-2.5-flash" # <optional>
      # Maximum milliseconds to wait for a general model first chunk before aborting.
      timeoutMs: 120000                 # <required>

    computation:
      model: "gemini-3-flash-preview"   # <required>
      apiKeyType: "free"                # <required>
      fallbackModel: "gemini-2.5-flash" # <optional>
      # Maximum milliseconds to wait for a computation model first chunk before aborting.
      timeoutMs: 120000                 # <required>

    search:
      model: "gemini-3-flash-preview"   # <required>
      apiKeyType: "paid"                # <required>
      fallbackModel: "gemini-2.5-flash" # <optional>
      # Maximum milliseconds to wait for a search model first chunk before aborting.
      timeoutMs: 120000                 # <required>
      # Search backend to use. Options: "google" | "tavily"   <optional, default: "google">
      #   google: Google Search grounding via Gemini API. Requires GOOGLE_PAID_API_KEY.
      #           Free only for gemini-2.5 models — gemini-3+ requires a paid plan.
      #   tavily: Tavily Search API. Requires TAVILY_API_KEY env var.
      mode: "google"

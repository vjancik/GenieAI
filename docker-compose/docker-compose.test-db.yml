name: genieai-test-db
services:
    db:
        image: postgres:18.3-alpine
        environment:
            POSTGRES_USER: genie_test
            POSTGRES_PASSWORD: genie_test
            POSTGRES_DB: genie_test
            PGDATA: /var/lib/postgresql/data
        ports:
            - "5433:5432"
        volumes:
            - ../db_test:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U genie_test -d genie_test"]
            interval: 10s
            timeout: 5s
            retries: 5
        restart: unless-stopped

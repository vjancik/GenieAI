name: genieaiv2-dev

services:
    db:
        image: postgres:18.3-alpine
        environment:
            POSTGRES_USER: genie
            POSTGRES_PASSWORD: genie
            POSTGRES_DB: genie
            PGDATA: /var/lib/postgresql/data
        ports:
            - "5432:5432"
        volumes:
            - ./db:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U genie -d genie"]
            interval: 10s
            timeout: 5s
            retries: 5
        restart: unless-stopped

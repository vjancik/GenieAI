name: genieaiv2-prod

services:
    db:
        image: postgres:18.3-alpine
        environment:
            POSTGRES_USER: genie
            POSTGRES_PASSWORD: genie
            POSTGRES_DB: genie
        ports:
            - "5434:5432"
        volumes:
            - db-data:/var/lib/postgresql/data
            - ./postgres-local-prod.conf:/etc/postgresql/postgresql.conf:ro
        command: postgres -c config_file=/etc/postgresql/postgresql.conf
        restart: unless-stopped

volumes:
    db-data:

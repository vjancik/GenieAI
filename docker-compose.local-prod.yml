name: genieaiv2-prod

services:
    db:
        image: postgres:18.3-alpine
        environment:
            POSTGRES_USER: genie
            POSTGRES_PASSWORD: genie
            POSTGRES_DB: genie
            PGDATA: /var/lib/postgresql/data
        ports:
            - "5434:5432"
        volumes:
            - db-data:/var/lib/postgresql/data
            - ./postgres-local-prod.conf:/etc/postgresql/postgresql.conf:ro
        command: postgres -c config_file=/etc/postgresql/postgresql.conf
        restart: unless-stopped

    app:
        build:
            context: .
            dockerfile: Dockerfile
        env_file:
            - .env
        environment:
            PATH: /home/bun/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            LOG_LEVEL: debug
            DATABASE_URL: postgresql://genie:genie@db:5432/genie
        volumes:
            - ./logs:/usr/src/app/logs
            - ~/bin:/home/bun/bin
        depends_on:
            - db
        restart: unless-stopped
volumes:
    db-data:

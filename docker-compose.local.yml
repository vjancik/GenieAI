name: genieai

services:
    db:
        image: postgres:18.3-alpine
        environment:
            POSTGRES_USER: genie
            POSTGRES_PASSWORD: genie
            POSTGRES_DB: genie
            PGDATA: /var/lib/postgresql/data
        ports:
            - "5434:5432"
        volumes:
            - db-data:/var/lib/postgresql/data
            - ./postgres-local.conf:/etc/postgresql/postgresql.conf:ro
        command: postgres -c config_file=/etc/postgresql/postgresql.conf
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U genie -d genie"]
            interval: 10s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    migrate:
        image: genieai-app:latest
        command: ["src/infrastructure/db/migrate.ts"]
        environment:
            DATABASE_URL: postgresql://genie:genie@db:5432/genie
        depends_on:
            db:
                condition: service_healthy
        restart: "no"

    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: genieai-app:latest
        env_file:
            - .env
        environment:
            LOG_LEVEL: debug
            DATABASE_URL: postgresql://genie:genie@db:5432/genie
        volumes:
            - ./logs:/usr/src/app/logs
            - ./config.local.yaml:/usr/src/app/config.local.yaml:ro
        depends_on:
            db:
                condition: service_healthy
            migrate:
                condition: service_completed_successfully
        restart: unless-stopped
volumes:
    db-data:
        name: genieai_db-data

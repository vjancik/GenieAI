name: Test and Build

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'
  pull_request:
    branches:
      - 'main'

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    services:
      db:
        image: postgres:18.3-alpine
        env:
          POSTGRES_USER: genie_test
          POSTGRES_PASSWORD: genie_test
          POSTGRES_DB: genie_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies
        run: bun ci

      - name: Run migrations
        run: bun db:test:migrate

      - name: Run tests
        run: bun run test --coverage --coverage-reporter=lcov
        env:
          DATABASE_TEST_URL: postgresql://genie_test:genie_test@localhost:5433/genie_test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

  docker-build-push:
    needs: tests
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      -
        uses: actions/checkout@v6
      -
        name: Docker extract build metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: vjancik/genieai
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        id: setup-buildx
      -
        name: Cache bun store (amd64)
        uses: actions/cache@v5
        with:
          path: bun-cache-amd64
          key: bun-amd64-${{ hashFiles('bun.lock') }}
          restore-keys: bun-amd64-
      -
        name: Cache bun store (arm64)
        uses: actions/cache@v5
        with:
          path: bun-cache-arm64
          key: bun-arm64-${{ hashFiles('bun.lock') }}
          restore-keys: bun-arm64-
      -
        name: Restore cache mounts into BuildKit
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          builder: ${{ steps.setup-buildx.outputs.name }}
          cache-map: |
            {
              "bun-cache-amd64": { "target": "/root/.bun/install/cache", "id": "bun-amd64" },
              "bun-cache-arm64": { "target": "/root/.bun/install/cache", "id": "bun-arm64" }
            }
      -
        name: Build and push
        id: push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
      -
        name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: index.docker.io/vjancik/genieai
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

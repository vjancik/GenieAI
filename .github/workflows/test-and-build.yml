name: Test and Build

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'
  pull_request:
    branches:
      - 'main'

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:18.3-alpine
        env:
          POSTGRES_USER: genie_test
          POSTGRES_PASSWORD: genie_test
          POSTGRES_DB: genie_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies
        run: bun ci

      - name: Run migrations
        run: bun db:test:migrate

      - name: Run tests
        run: bun run test
        env:
          DATABASE_URL: postgresql://genie_test:genie_test@localhost:5433/genie_test

  docker-build-push:
    needs: tests
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      -
        name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: vjancik/genieai
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Build and push
        id: push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
      # Requires a public repository — uncomment when repo is made public
      # -
      #   name: Generate artifact attestation
      #   uses: actions/attest@v4
      #   with:
      #     subject-name: index.docker.io/vjancik/genieai
      #     subject-digest: ${{ steps.push.outputs.digest }}
      #     push-to-registry: true
